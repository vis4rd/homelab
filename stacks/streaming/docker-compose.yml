services:
  # JELLYFIN
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: 1000:1000 # instead of root
    group_add:
      - 1001 # storage group
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - jellyfin_cache:/cache
      - jellyfin_data:/config
      - ./jellyfin/config/config:/config/config
      - ./jellyfin/config/plugins:/config/plugins
      - ./jellyfin/config/root:/config/root
      - ./jellyfin/logs:/config/log
      - type: bind
        source: /srv/storage
        target: /media
      # Optional - extra fonts to be used during transcoding with subtitle burn-in
      # - type: bind
      #   source: /path/to/fonts
      #   target: /usr/local/share/fonts/custom
      #   read_only: true
    networks:
      - frontend
      - tailscale_net

networks:
  frontend:
    name: frontend
    external: true
  tailscale_net:
    name: tailscale_exposed
    external: true

volumes:
  jellyfin_cache:
    name: jellyfin_cache
  jellyfin_data:
    name: jellyfin_data
