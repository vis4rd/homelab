services:
  # FILEBROWSER
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    group_add:
      - 1001 # storage group
    ports:
      - 8080:80
    volumes:
      - /srv/storage:/srv # this should point to the storage location
      - filebrowser_data:/database
      - filebrowser_config:/config
      - ./filebrowser/customization:/config/branding # https://filebrowser.org/customization.html
    environment:
      # available env variables: https://filebrowser.org/cli/filebrowser.html#options
      FB_NOAUTH: true
      FB_USERNAME: File Browser
    networks:
      - frontend

  duplicati:
    image: duplicati/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    volumes:
      - duplicati_data:/data
      - /mnt/backup:/backups
      - /home:/sources/home
      - /var/lib/docker/volumes:/sources/docker_volumes
    environment:
      SETTINGS_ENCRYPTION_KEY: "$$settings-key"
      DUPLICATI__SECRET_PROVIDER: file-secret:///run/secrets/duplicati_secrets
      DUPLICATI__WEBSERVICE_PASSWORD: "$$ui-password"
      DUPLICATI__WEBSERVICE_ALLOWED_HOSTNAMES: "backup.home.arpa"
    secrets:
      - duplicati_secrets
    networks:
      - frontend

networks:
  frontend:
    name: frontend
    external: true

volumes:
  filebrowser_data:
    name: filebrowser_data
  filebrowser_config:
    name: filebrowser_config
  duplicati_data:
    name: duplicati_data

secrets:
  duplicati_secrets:
    file: ./duplicati/secrets.json
