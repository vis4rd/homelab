services:

  # CADDY (REVERSE PROXY)
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      # <host-port>:<container-port>
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/config:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend

  # PI-HOLE (ADBLOCK + DNS SERVER)
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - 53:53/tcp # DNS TCP
      - 53:53/udp # DNS UDP
      - 82:80/tcp # HTTP access to admin dashboard
      - 444:443/tcp # HTTPS access to admin dashboard
    env_file:
      - ./.env
    environment:
      TZ: Europe/Warsaw
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_misc_etc_dnsmasq_d: 'true'
    volumes:
      - pihole:/etc/pihole
      # Track configuration files with git
      - ./pihole/dnsmasq.d:/etc/dnsmasq.d
    networks:
      - frontend
    # cap_add:
      # - SYS_NICE

networks:
  frontend:
    name: frontend
    external: true

volumes:
  caddy_data:
  caddy_config:
  pihole:
